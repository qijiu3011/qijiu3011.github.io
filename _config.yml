# Site
title: MianYy的博客
subtitle: ''
description: 记录我的算法竞赛学习之路
keywords: ACM,算法,编程
author: qijiu3011
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://qijiu3011.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 自定义样式
custom_css:
  - /css/beauty.css

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: fluid
theme_config:
  custom_css:
    - /css/beauty.css

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
  type: git
  repo: git@github.com:qijiu3011/qijiu3011.github.io.git
  branch: main

Blog-Like:
  enable: true #是否启用插件
  Backend: Cloudflare # 可选 Cloudflare | Leancloud | PHP，默认Cloudflare
  CloudflareBackend: https://blog-like.2220795057.workers.dev #你的后端地址
  PHPBackend: #自部署PHP后端地址
  AppID: #如果你使用Leancloud，记得填你的Leancloud ID和KEY
  AppKEY: #你的KEY
  xianzhi: true #是否限制点赞数，默认开启
  number: 1 #如果限制点赞数，限制的点赞数，默认为5个赞
  GoogleAnalytics: true #是否向谷歌分析发送点赞事件，默认关闭
  GAEventCategory: Engagement #点赞事件类别，默认Engagement
  GAEventAction: Like #事件名称，默认Like