e">    nowPl = (nowPl == <span class="number">1</span>) ? <span class="number">2</span> : <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="type">int</span> row, col;</span><br><span class="line">    <span class="keyword">while</span>(<span class="number">1</span>)</span><br><span class="line">    &#123;</span><br><span class="line">        <span class="built_in">print</span>();</span><br><span class="line">        cout &lt;&lt; <span class="string">&quot;玩家: &quot;</span> &lt;&lt; nowPl &lt;&lt; ((nowPl == <span class="number">1</span>) ? <span class="string">&quot;(X)&quot;</span> : <span class="string">&quot;(O)&quot;</span>) &lt;&lt; <span class="string">&quot; 落子&quot;</span> &lt;&lt; endl;</span><br><span class="line">        cin &gt;&gt; row &gt;&gt; col;</span><br><span class="line">        row--, col--;</span><br><span class="line">        <span class="keyword">if</span>(!<span class="built_in">check</span>(row, col))</span><br><span class="line">        &#123;</span><br><span class="line">            cout &lt;&lt; <span class="string">&quot;无效位置，按任意键重新输入...&quot;</span> &lt;&lt; endl;</span><br><span class="line">            cin.<span class="built_in">ignore</span>(); cin.<span class="built_in">get</span>();</span><br><span class="line">            <span class="keyword">continue</span>;</span><br><span class="line">        &#125;</span><br><span class="line">        cnt++;</span><br><span class="line">        <span class="keyword">if</span>(<span class="built_in">checkWin</span>(row, col, nowPl))</span><br><span class="line">        &#123;</span><br><span class="line">            <span class="built_in">print</span>();</span><br><span class="line">
