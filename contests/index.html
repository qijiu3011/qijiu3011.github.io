<script>
const USERNAME = 'qijiu3011';
const API_KEY = '1b75ebe3156451b77b10580ea9ad1f53b5bf6c42';

function formatDate(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffDays = Math.floor((date - now) / (1000 * 60 * 60 * 24));
  if (diffDays < 0) return '已开始';
  if (diffDays === 0) {
    const hours = date.getHours().toString().padStart(2,'0');
    const mins = date.getMinutes().toString().padStart(2,'0');
    return `今天 ${hours}:${mins}`;
  }
  if (diffDays === 1) {
    const hours = date.getHours().toString().padStart(2,'0');
    const mins = date.getMinutes().toString().padStart(2,'0');
    return `明天 ${hours}:${mins}`;
  }
  return `${diffDays}天后`;
}

// 获取日期的显示字符串（例如：3月14日 星期六）
function getDayDisplay(isoString) {
  const date = new Date(isoString);
  const month = date.getMonth() + 1;
  const day = date.getDate();
  const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const weekday = weekdays[date.getDay()];
  return `${month}月${day}日 ${weekday}`;
}

function isRatedContest(contest) {
  const title = contest.event;
  const resource = contest.resource || '';
  
  if (resource.includes('codeforces.com')) {
    return !title.includes('Unrated');
  } else if (resource.includes('atcoder.jp')) {
    return title.includes('Beginner Contest') || 
           title.includes('Regular Contest') || 
           title.includes('Grand Contest');
  } else if (resource.includes('ac.nowcoder.com')) {
    return title.includes('小白月赛') || title.includes('练习赛') || title.includes('挑战赛');
  }
  return false;
}

async function loadContests() {
  const loadingEl = document.getElementById('loading');
  const listEl = document.getElementById('contest-list');
  
  const now = new Date();
  const startStr = now.toISOString().split('T')[0];
  const end = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000);
  const endStr = end.toISOString().split('T')[0];

  const url = `https://clist.by/api/v4/contest/?username=${USERNAME}&api_key=${API_KEY}&start__gte=${startStr}&end__lte=${endStr}&order_by=start`;

  try {
    const response = await fetch(url);
    const data = await response.json();
    const allContests = data.objects || [];

    // 筛选 CF、AtCoder、牛客
    const cfContests = allContests.filter(c => c.resource && c.resource.includes('codeforces.com'));
    const atcoderContests = allContests.filter(c => c.resource && c.resource.includes('atcoder.jp'));
    const nowcoderContests = allContests.filter(c => c.resource && c.resource.includes('ac.nowcoder.com'));
    const filtered = [...cfContests, ...atcoderContests, ...nowcoderContests];
    
    // 过滤出 Rated 比赛
    const ratedContests = filtered.filter(isRatedContest);

    loadingEl.style.display = 'none';

    if (ratedContests.length === 0) {
      listEl.innerHTML = '<p style="text-align: center; color: #718096;">未来14天暂无Rated比赛</p>';
      return;
    }

    // 按日期分组
    const groups = {};
    ratedContests.forEach(c => {
      const dateKey = c.start.split('T')[0]; // 取 YYYY-MM-DD 作为分组键
      if (!groups[dateKey]) groups[dateKey] = [];
      groups[dateKey].push(c);
    });

    // 生成 HTML
    let html = '';
    // 按日期排序（升序）
    const sortedDates = Object.keys(groups).sort();
    sortedDates.forEach(dateKey => {
      const dayContests = groups[dateKey];
      const dayDisplay = getDayDisplay(dateKey); // 转换为显示格式
      html += `<div class="contest-day-group">`;
      html += `<div class="day-title">${dayDisplay}</div>`;
      html += `<div class="contest-cards-row">`;
      
      dayContests.forEach(c => {
        const startDate = formatDate(c.start);
        const durationHours = Math.floor(c.duration / 3600);
        const durationMinutes = Math.floor((c.duration % 3600) / 60);
        let platform = '未知';
        if (c.resource.includes('codeforces.com')) platform = 'Codeforces';
        else if (c.resource.includes('atcoder.jp')) platform = 'AtCoder';
        else if (c.resource.includes('ac.nowcoder.com')) platform = '牛客';

        html += `
          <div class="contest-item">
            <div class="contest-header">
              <span class="contest-platform">${platform}</span>
              <a href="${c.href}" target="_blank" class="contest-name">${c.event}</a>
              <span class="rated-badge">Rated</span>
            </div>
            <div class="contest-time">
              <span>⏰ 开始：${startDate}</span>
              <span>⏱️ 时长：${durationHours}h${durationMinutes > 0 ? durationMinutes + 'm' : ''}</span>
            </div>
          </div>
        `;
      });
      
      html += `</div>`; // 关闭 contest-cards-row
      html += `</div>`; // 关闭 contest-day-group
    });

    listEl.innerHTML = html;
  } catch (error) {
    loadingEl.style.display = 'none';
    listEl.innerHTML = '<div class="error-message">❌ 加载失败，请稍后重试</div>';
    console.error('Load error:', error);
  }
}

document.addEventListener('DOMContentLoaded', loadContests);
</script>
