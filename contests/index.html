<script>
// CF API 代理（解决跨域）
const CF_API = 'https://codeforces.com/api/contest.list';

// 时间格式化
function formatDate(timestamp) {
  const date = new Date(timestamp * 1000);
  const now = new Date();
  const diffDays = Math.floor((date - now) / (1000 * 60 * 60 * 24));
  const diffHours = Math.floor((date - now) / (1000 * 60 * 60));
  
  if (diffDays < 0) return '已开始';
  if (diffDays === 0) {
    if (diffHours < 24) return `今天 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    return `明天 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
  }
  if (diffDays === 1) return `明天 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
  return `${diffDays}天后`;
}

// 获取CF比赛
async function fetchCFContests() {
  try {
    const response = await fetch(CF_API);
    const data = await response.json();
    if (data.status !== 'OK') return [];
    
    const now = Math.floor(Date.now() / 1000);
    const twoWeeks = 14 * 24 * 60 * 60;
    
    return data.result
      .filter(c => c.phase === 'BEFORE' && (c.startTimeSeconds - now) <= twoWeeks)
      .map(c => ({
        platform: 'Codeforces',
        name: c.name,
        url: `https://codeforces.com/contest/${c.id}`,
        startTime: c.startTimeSeconds,
        duration: c.durationSeconds,
        rated: c.name.includes('Rated') || c.name.includes('Div. 1') || c.name.includes('Div. 2'),
        phase: c.phase
      }));
  } catch (error) {
    console.error('CF fetch error:', error);
    return [];
  }
}

// 获取AtCoder比赛（使用第三方API代理）
async function fetchAtCoderContests() {
  try {
    // 使用 kenkoooo 的公开 API
    const response = await fetch('https://kenkoooo.com/atcoder/resources/contests.json');
    const contests = await response.json();
    
    const now = Math.floor(Date.now() / 1000);
    const twoWeeks = 14 * 24 * 60 * 60;
    
    return contests
      .filter(c => {
        const startTime = new Date(c.start_epoch_second).getTime() / 1000;
        return startTime > now && (startTime - now) <= twoWeeks;
      })
      .map(c => ({
        platform: 'AtCoder',
        name: c.title,
        url: `https://atcoder.jp/contests/${c.id}`,
        startTime: new Date(c.start_epoch_second).getTime() / 1000,
        duration: c.duration_second,
        rated: c.rated_range !== '-' && c.rated_range !== '0',
        phase: 'BEFORE'
      }));
  } catch (error) {
    console.error('AtCoder fetch error:', error);
    return [];
  }
}

// 模拟牛客数据（示例，需要自己抓取）
function mockNowcoderContests() {
  // 这里可以换成你的爬虫数据接口
  return [
    // {
    //   platform: '牛客',
    //   name: '牛客周赛 Round 84',
    //   url: 'https://ac.nowcoder.com/acm/contest/123456',
    //   startTime: Math.floor(Date.now() / 1000) + 3 * 24 * 60 * 60,
    //   duration: 2 * 60 * 60,
    //   rated: true,
    //   phase: 'BEFORE'
    // }
  ];
}

// 模拟洛谷数据
function mockLuoguContests() {
  return [
    // {
    //   platform: '洛谷',
    //   name: '【LGR-xxx】洛谷入门赛',
    //   url: 'https://www.luogu.com.cn/contest/123456',
    //   startTime: Math.floor(Date.now() / 1000) + 5 * 24 * 60 * 60,
    //   duration: 2.5 * 60 * 60,
    //   rated: true,
    //   phase: 'BEFORE'
    // }
  ];
}

// 主函数
async function loadContests() {
  const loadingEl = document.getElementById('loading');
  const listEl = document.getElementById('contest-list');
  
  try {
    const [cf, atcoder] = await Promise.all([
      fetchCFContests(),
      fetchAtCoderContests()
    ]);
    
    // 合并数据（加上牛客和洛谷的模拟数据）
    const mockNowcoder = mockNowcoderContests();
    const mockLuogu = mockLuoguContests();
    
    const allContests = [...cf, ...atcoder, ...mockNowcoder, ...mockLuogu]
      .sort((a, b) => a.startTime - b.startTime);
    
    if (allContests.length === 0) {
      loadingEl.style.display = 'none';
      listEl.innerHTML = '<p style="text-align: center; color: #718096;">未来14天暂无Rated比赛</p>';
      return;
    }
    
    loadingEl.style.display = 'none';
    
    let html = '';
    allContests.forEach(c => {
      const startDate = formatDate(c.startTime);
      const durationHours = Math.floor(c.duration / 3600);
      const durationMinutes = Math.floor((c.duration % 3600) / 60);
      
      html += `
        <div class="contest-item">
          <div class="contest-header">
            <span class="contest-platform">${c.platform}</span>
            <a href="${c.url}" target="_blank" class="contest-name">${c.name}</a>
            ${c.rated ? '<span class="rated-badge">Rated</span>' : ''}
          </div>
          <div class="contest-time">
            <span>⏰ 开始：${startDate}</span>
            <span>⏱️ 时长：${durationHours}h${durationMinutes > 0 ? durationMinutes + 'm' : ''}</span>
          </div>
        </div>
      `;
    });
    
    listEl.innerHTML = html;
    
  } catch (error) {
    loadingEl.style.display = 'none';
    listEl.innerHTML = `<div class="error-message">❌ 加载失败，请稍后重试</div>`;
    console.error('Load error:', error);
  }
}

// 页面加载后执行
document.addEventListener('DOMContentLoaded', loadContests);
</script>
